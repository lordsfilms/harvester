mixed-port: 33333
bind-address: "*"
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"

secret: mihomo
external-ui: ui # ----> http://127.0.0.1:33332/ui <----
external-ui-url: https://github.com/MetaCubeX/metacubexd/releases/latest/download/compressed-dist.tgz
external-controller: 127.0.0.1:33332

dns:
  enable: true
  cache-algorithm: arc
  prefer-h3: false
  use-hosts: false
  use-system-hosts: false
  respect-rules: false
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - '45.155.204.190'
    - '111.88.96.50'
    - '8.8.8.8'
    - '1.1.1.1'
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  fake-ip-filter-mode: 'blacklist'
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost'
  nameserver-policy:
    'geosite:google-deepmind,openai,spotify,twitch,anthropic':
      - 'https://xbox-dns.ru/dns-query'
      - 'https://dns.geohide.ru:444/dns-query'
  nameserver:
    - 'https://dns.geohide.ru:444/dns-query'
    - 'https://xbox-dns.ru/dns-query'
    - 'https://8.8.8.8/dns-query'
    - 'https://1.1.1.1/dns-query'

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

proxy-providers:
  warp_provider:
    type: http
    url: https://fastly.jsdelivr.net/gh/luxxuria/harvester@main/warp-endpoints.list
    path: ./providers/warp-endpoints.list
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: https://connectivitycheck.gstatic.com/generate_204  
  all_provider:
    type: http
    url: https://fastly.jsdelivr.net/gh/luxxuria/harvester@main/non_ru.txt
    interval: 3600
    path: ./providers/non_ru.txt
    health-check:
      enable: true
      interval: 600
      url: https://connectivitycheck.gstatic.com/generate_204

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - warp
      - proxy_provider
  - name: warp
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    timeout: 3000
    icon: https://www.vectorlogo.zone/logos/cloudflare/cloudflare-icon.svg
    use:
      - warp_provider
  - name: proxy_provider
    type: url-test
    url: https://connectivitycheck.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    timeout: 5000
    use:
      - all_provider

rules:
  - RULE-SET,private-ips,DIRECT,no-resolve
  - GEOSITE,private,DIRECT
  - IP-CIDR,::/0,REJECT,no-resolve
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,category-ru,DIRECT
  - RULE-SET,whitelist,DIRECT
  - GEOIP,ru,DIRECT,no-resolve
  - GEOSITE,youtube,PROXY
  - GEOSITE,google,DIRECT
  - GEOSITE,openai,DIRECT
  - GEOSITE,anthropic,DIRECT
  - GEOSITE,spotify,DIRECT
  - GEOSITE,pinterest,DIRECT
  - GEOSITE,twitch,DIRECT
  - MATCH,PROXY

rule-providers:
  private-ips:
    type: http
    behavior: ipcidr
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs"
    path: ./rules/private-ips.mrs
    interval: 2592000
  whitelist:
    type: http
    behavior: domain
    format: mrs
    url: https://fastly.jsdelivr.net/gh/hydraponique/roscomvpn-geosite/release/mihomo/whitelist.mrs
    path: ./ruleset/whitelist.mrs
    interval: 86400
